<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infrastructure Issue Prioritizer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f3;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666660;
  --color-text-tertiary: #aaa;
  --color-border-tertiary: rgba(0,0,0,0.1);
  --color-border-secondary: rgba(0,0,0,0.18);
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #1a1a1a;
    --color-background-secondary: #242424;
    --color-text-primary: #f0ede8;
    --color-text-secondary: #888;
    --color-text-tertiary: #555;
    --color-border-tertiary: rgba(255,255,255,0.1);
    --color-border-secondary: rgba(255,255,255,0.18);
  }
}
body {
  font-family: var(--font-sans);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}
.app { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.header p { font-size: 14px; color: var(--color-text-secondary); }
.badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; background: #E6F1FB; color: #0C447C; padding: 3px 9px; border-radius: 4px; margin-bottom: 10px; letter-spacing: 0.04em; }
.badge-dot { width: 5px; height: 5px; background: #185FA5; border-radius: 50%; animation: pulse 2s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
textarea { width: 100%; min-height: 130px; font-size: 14px; padding: 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); resize: vertical; font-family: var(--font-sans); line-height: 1.6; }
textarea:focus { outline: none; border-color: #378ADD; box-shadow: 0 0 0 2px rgba(55,138,221,0.12); }
textarea::placeholder { color: var(--color-text-tertiary); }
.controls { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
.btn-primary { background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); padding: 9px 20px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font-sans); transition: opacity 0.15s; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: transparent; color: var(--color-text-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 9px 16px; font-size: 14px; cursor: pointer; font-family: var(--font-sans); }
.btn-secondary:hover { background: var(--color-background-secondary); }
.loading { display: none; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text-secondary); margin-top: 1rem; }
.loading.active { display: flex; }
.spinner { width: 14px; height: 14px; border: 1.5px solid var(--color-border-secondary); border-top-color: #378ADD; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.results { margin-top: 1.5rem; display: none; }
.results.active { display: block; }
.results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.results-header span { font-size: 13px; color: var(--color-text-secondary); }
.summary-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
.stat-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.issue-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; margin-bottom: 10px; display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: start; }
.issue-card:hover { border-color: var(--color-border-secondary); }
.rank-badge { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
.rank-1 { background: #FCEBEB; color: #791F1F; }
.rank-2 { background: #FAEEDA; color: #633806; }
.rank-3 { background: #E6F1FB; color: #0C447C; }
.rank-n { background: var(--color-background-secondary); color: var(--color-text-secondary); }
.issue-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.issue-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; margin-bottom: 8px; }
.issue-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
.tag-category { background: var(--color-background-secondary); color: var(--color-text-secondary); }
.urgency-critical { background: #FCEBEB; color: #791F1F; }
.urgency-high { background: #FAEEDA; color: #633806; }
.urgency-medium { background: #EAF3DE; color: #27500A; }
.urgency-low { background: var(--color-background-secondary); color: var(--color-text-secondary); }
.issue-meta { text-align: right; flex-shrink: 0; }
.cost-range { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.cost-label { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.score-bar { width: 60px; height: 4px; background: var(--color-border-tertiary); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 2px; }
.action-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; margin-top: 10px; font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
.action-box strong { color: var(--color-text-primary); font-weight: 500; }
.error-msg { background: #FCEBEB; border: 0.5px solid #F09595; border-radius: var(--border-radius-md); padding: 12px 14px; font-size: 13px; color: #791F1F; margin-top: 1rem; display: none; }
.error-msg.active { display: block; }
.export-btn { font-size: 12px; color: var(--color-text-secondary); background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 5px 10px; cursor: pointer; font-family: var(--font-sans); }
.export-btn:hover { background: var(--color-background-secondary); }
.footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 0.5px solid var(--color-border-tertiary); font-size: 12px; color: var(--color-text-tertiary); display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge"><span class="badge-dot"></span>AI-powered · Built for CYVL</div>
    <h1>Infrastructure issue prioritizer</h1>
    <p>Paste city infrastructure complaints below. The AI ranks them by urgency, estimated cost, and impact.</p>
  </div>

  <textarea id="input" placeholder="e.g.&#10;- Large pothole on Main St causing flat tires&#10;- Streetlight out on Oak Ave for 3 weeks&#10;- Water main leak reported at 4th and Park&#10;- Sidewalk crack near elementary school entrance&#10;- Bridge deck showing surface corrosion on Route 9"></textarea>

  <div class="controls">
    <button class="btn-primary" id="analyzeBtn" onclick="analyze()">Analyze issues</button>
    <button class="btn-secondary" onclick="loadExample()">Load example</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span id="loadingText">Analyzing issues...</span>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="results" id="results">
    <div class="results-header">
      <span id="resultsLabel"></span>
      <button class="export-btn" onclick="exportCSV()">Export CSV</button>
    </div>
    <div class="summary-grid" id="summaryGrid"></div>
    <div id="issuesList"></div>
  </div>

  <div class="footer">
    <span>Built by Cauã Victor · UNC Chapel Hill CS/Economics</span>
    <span>Powered by Claude API</span>
  </div>
</div>

<script>
const EXAMPLES = `- Large pothole on Main St near downtown causing flat tires daily
- Streetlight out on Oak Ave for 3 weeks, reported multiple times
- Water main leak at intersection of 4th and Park Ave, active seepage
- Sidewalk severely cracked near Lincoln Elementary School entrance
- Bridge deck showing surface corrosion on Route 9 overpass
- Storm drain blocked on Elm St causing flooding after rain
- Guardrail missing on curve on Highway 7 near mile marker 14`;

let lastResults = [];

function loadExample() {
  document.getElementById('input').value = EXAMPLES;
}

function urgencyClass(u) {
  const map = { critical: 'urgency-critical', high: 'urgency-high', medium: 'urgency-medium', low: 'urgency-low' };
  return map[(u||'').toLowerCase()] || 'urgency-low';
}

function rankClass(i) {
  if (i === 0) return 'rank-1';
  if (i === 1) return 'rank-2';
  if (i === 2) return 'rank-3';
  return 'rank-n';
}

function scoreColor(score) {
  if (score >= 80) return '#E24B4A';
  if (score >= 60) return '#EF9F27';
  if (score >= 40) return '#639922';
  return '#888780';
}

function renderResults(issues) {
  lastResults = issues;
  const critical = issues.filter(i => (i.urgency||'').toLowerCase() === 'critical').length;
  const totalCost = issues.reduce((s, i) => s + (i.cost_mid || 0), 0);
  const avgScore = Math.round(issues.reduce((s, i) => s + (i.priority_score || 0), 0) / issues.length);

  document.getElementById('summaryGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Issues analyzed</div>
      <div class="stat-value">${issues.length}</div>
      <div class="stat-sub">${critical} critical</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Est. total cost</div>
      <div class="stat-value">$${(totalCost/1000).toFixed(0)}K</div>
      <div class="stat-sub">combined estimate</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg priority score</div>
      <div class="stat-value">${avgScore}</div>
      <div class="stat-sub">out of 100</div>
    </div>`;

  document.getElementById('resultsLabel').textContent = `${issues.length} issues ranked by priority`;

  const list = document.getElementById('issuesList');
  list.innerHTML = issues.map((issue, i) => `
    <div class="issue-card">
      <div class="rank-badge ${rankClass(i)}">${i+1}</div>
      <div>
        <div class="issue-title">${issue.title || 'Issue'}</div>
        <div class="issue-desc">${issue.description || ''}</div>
        <div class="issue-tags">
          <span class="tag ${urgencyClass(issue.urgency)}">${(issue.urgency||'').toUpperCase()}</span>
          <span class="tag tag-category">${issue.category || ''}</span>
          ${issue.safety_risk ? '<span class="tag urgency-critical">Safety risk</span>' : ''}
          ${issue.compliance_flag ? '<span class="tag urgency-high">Compliance</span>' : ''}
        </div>
        <div class="action-box"><strong>Recommended action:</strong> ${issue.recommended_action || ''}</div>
      </div>
      <div class="issue-meta">
        <div class="cost-range">${issue.cost_range || ''}</div>
        <div class="cost-label">est. cost</div>
        <div class="score-bar"><div class="score-fill" style="width:${issue.priority_score||0}%;background:${scoreColor(issue.priority_score||0)}"></div></div>
        <div class="cost-label" style="margin-top:3px">score: ${issue.priority_score||0}</div>
      </div>
    </div>`).join('');
}

function exportCSV() {
  if (!lastResults.length) return;
  const headers = ['Rank','Title','Urgency','Category','Priority Score','Cost Range','Safety Risk','Recommended Action'];
  const rows = lastResults.map((r, i) => [i+1, r.title, r.urgency, r.category, r.priority_score, r.cost_range, r.safety_risk ? 'Yes' : 'No', r.recommended_action]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'infrastructure_priorities.csv'; a.click();
}

async function analyze() {
  const text = document.getElementById('input').value.trim();
  if (!text) return;

  const btn = document.getElementById('analyzeBtn');
  const loading = document.getElementById('loading');
  const results = document.getElementById('results');
  const errorMsg = document.getElementById('errorMsg');

  btn.disabled = true;
  loading.classList.add('active');
  results.classList.remove('active');
  errorMsg.classList.remove('active');

  const loadingTexts = ['Analyzing issues...', 'Scoring urgency and risk...', 'Estimating costs...', 'Ranking by priority...'];
  let li = 0;
  const interval = setInterval(() => {
    li = (li+1) % loadingTexts.length;
    document.getElementById('loadingText').textContent = loadingTexts[li];
  }, 1800);

  const prompt = `You are an infrastructure analyst for a city government. Analyze the following infrastructure issues and return a JSON array of objects, one per issue.

Each object must have:
- title: short 4-8 word title
- description: one sentence elaborating on the issue and its impact
- urgency: one of "Critical", "High", "Medium", "Low"
- category: one of "Road", "Water", "Bridge", "Electrical", "Drainage", "Sidewalk", "Other"
- priority_score: integer 0-100 (100 = most urgent)
- cost_range: estimated repair cost range as string e.g. "$2K–$8K" or "$50K–$200K"
- cost_mid: midpoint of cost estimate as integer (in dollars, no symbols)
- safety_risk: boolean, true if it poses immediate risk to life/safety
- compliance_flag: boolean, true if ADA or federal compliance issue
- recommended_action: one concrete action sentence (who should act, what, when)

Rank them from highest to lowest priority_score. Return ONLY the JSON array, no markdown, no explanation.

Issues:
${text}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    clearInterval(interval);

    if (!res.ok) throw new Error(data.error?.message || 'API error');

    const raw = data.content.map(b => b.text || '').join('').replace(/```json|```/g, '').trim();
    const issues = JSON.parse(raw);

    renderResults(issues);
    results.classList.add('active');
  } catch (err) {
    clearInterval(interval);
    errorMsg.textContent = 'Analysis failed: ' + err.message + '. Make sure you are running this via a server that proxies the Anthropic API key.';
    errorMsg.classList.add('active');
  } finally {
    loading.classList.remove('active');
    btn.disabled = false;
  }
}
</script>
</body>
</html>
